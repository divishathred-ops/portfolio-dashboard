name: Deploy Tableau Dashboard
on:
  push:
    branches: ["main"]
permissions:
  contents: read
  pages: write
  id-token: write
jobs:
  deploy:
    environment:
      name: github-pages
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Pages
        uses: actions/configure-pages@v4
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # This treats the dashboard folder as the website root
          path: './dashboard' 
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
